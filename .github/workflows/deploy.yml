name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF export dependencies
        run: pip install weasyprint PyMuPDF Pillow

      - name: Render PDF
        run: python3 docs/pdf-export/main.py

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy site
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSHPASS" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -T astartup@162.241.226.70 << 'EOF'
          cd /home3/astartup/public_html/andrewcromar/web_portfolio
          git pull origin main
          exit
          EOF

      - name: Upload rendered PDF
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSHPASS" scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "public/renders/render.pdf" \
            astartup@162.241.226.70:/home3/astartup/public_html/andrewcromar/web_portfolio/public/renders/render.pdf
