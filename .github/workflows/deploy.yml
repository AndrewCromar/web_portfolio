name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF export dependencies
        run: pip install weasyprint PyMuPDF Pillow

      - name: Render PDF
        run: python3 docs/pdf-export/main.py

      - name: Commit rendered PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/renders/render.pdf
          git diff --cached --quiet || git commit -m "render portfolio PDF [skip ci]"
          git push

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -p "$SSHPASS" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -T astartup@162.241.226.70 << 'EOF'
          cd /home3/astartup/public_html/andrewcromar/web_portfolio
          git pull origin main
          exit
          EOF
